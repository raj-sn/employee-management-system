services:

  db:
    image: postgres
    container_name: postgres-db

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

      
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

  web:
    build: .

    container_name: flask-app

    ports:
      - "5000:5000"

    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}


    depends_on:
      - db

volumes:
  postgres_data:
